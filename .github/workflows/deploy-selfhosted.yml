name: Build and Deploy on Self-Hosted Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Azure login
        shell: bash
        run: |
          az account show

      - name: Log in to ACR
        shell: bash
        run: |
          az acr login --name recipehubacr46431

      - name: Set variables
        shell: bash
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "RG=recipehub-rg" >> $GITHUB_ENV
          echo "ACR_LOGIN_SERVER=recipehubacr46431.azurecr.io" >> $GITHUB_ENV

          acrUser=$(az acr credential show --name recipehubacr46431 --query username -o tsv)
          acrPass=$(az acr credential show --name recipehubacr46431 --query "passwords[0].value" -o tsv)

          echo "TRIVY_USERNAME=$acrUser" >> $GITHUB_ENV
          echo "TRIVY_PASSWORD=$acrPass" >> $GITHUB_ENV

      - name: Get current recipe service URL
        shell: bash
        run: |
          recipeFqdn=$(az containerapp show \
            --name recipe-service \
            --resource-group recipehub-rg \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)

          echo "RECIPE_URL=https://$recipeFqdn" >> $GITHUB_ENV
          echo "Recipe URL is https://$recipeFqdn"

      - name: Build and push notification-service image
        shell: bash
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/notification-service:$IMAGE_TAG \
            ./notification-service
          docker push $ACR_LOGIN_SERVER/notification-service:$IMAGE_TAG

      - name: Build and push recipe-service image
        shell: bash
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/recipe-service:$IMAGE_TAG \
            ./recipe-service
          docker push $ACR_LOGIN_SERVER/recipe-service:$IMAGE_TAG

      - name: Build and push frontend image
        shell: bash
        run: |
          docker build \
            --build-arg VITE_API_URL="$RECIPE_URL" \
            -t $ACR_LOGIN_SERVER/frontend:$IMAGE_TAG \
            ./frontend
          docker push $ACR_LOGIN_SERVER/frontend:$IMAGE_TAG

      - name: Scan notification-service image with Trivy
        shell: bash
        run: |
          docker run --rm \
            -e TRIVY_USERNAME=$TRIVY_USERNAME \
            -e TRIVY_PASSWORD=$TRIVY_PASSWORD \
            aquasec/trivy:0.70.0 image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            $ACR_LOGIN_SERVER/notification-service:$IMAGE_TAG

      - name: Scan recipe-service image with Trivy
        shell: bash
        run: |
          docker run --rm \
            -e TRIVY_USERNAME=$TRIVY_USERNAME \
            -e TRIVY_PASSWORD=$TRIVY_PASSWORD \
            aquasec/trivy:0.70.0 image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            $ACR_LOGIN_SERVER/recipe-service:$IMAGE_TAG

      - name: Scan frontend image with Trivy
        shell: bash
        run: |
          docker run --rm \
            -e TRIVY_USERNAME=$TRIVY_USERNAME \
            -e TRIVY_PASSWORD=$TRIVY_PASSWORD \
            aquasec/trivy:0.70.0 image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            $ACR_LOGIN_SERVER/frontend:$IMAGE_TAG

      - name: Update notification service
        shell: bash
        run: |
          az containerapp update \
            --name notification-service \
            --resource-group recipehub-rg \
            --image $ACR_LOGIN_SERVER/notification-service:$IMAGE_TAG

      - name: Update recipe service
        shell: bash
        run: |
          az containerapp update \
            --name recipe-service \
            --resource-group recipehub-rg \
            --image $ACR_LOGIN_SERVER/recipe-service:$IMAGE_TAG

      - name: Update frontend
        shell: bash
        run: |
          az containerapp update \
            --name frontend-app \
            --resource-group recipehub-rg \
            --image $ACR_LOGIN_SERVER/frontend:$IMAGE_TAG
